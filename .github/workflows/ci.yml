name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint and type-check — runs on every PR and push to main
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

      - name: Run TypeScript type check
        run: npm run type-check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests — depends on quality; runs on every PR and push to main
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Vitest
        run: npm run test -- --reporter=verbose --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: E2E tests — depends on quality; runs on push to main ONLY
  # Skipped on pull requests to save CI time.
  # Some tests may fail without a real Supabase session — this is expected and
  # documented. Placeholder env vars are used so the Next.js build can complete
  # without a live database connection.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
      SUPABASE_SECRET_KEY: sb_secret_placeholder
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      SESSION_URL: postgresql://user:pass@localhost:5432/db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Start production server
        run: npm run start &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Security scan — runs independently; non-blocking
  # Audit failures are reported but do NOT fail the pipeline.
  # Findings should be reviewed and triaged manually.
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true
